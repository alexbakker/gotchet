name: build
on: [pull_request, push]
env:
  DOCKER_REPO: docker.io/alexanderbakker/gotchet
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
        with:
          diagnostic-endpoint: ""
      - name: Build binary
        run: |
          nix build --print-build-logs
          ./result/bin/gotchet version
      - name: Check version number
        if: startsWith(github.ref_name, 'v')
        run: |
          if ! ./result/bin/gotchet version | grep -q '${{ github.ref_name }}'; then
            echo "Version information doesn't match"
            exit 1
          fi
      - name: Build docker image
        run: |
          nix build .#gotchet-docker --print-build-logs
          podman load -i ./result
      - name: Tag Docker image
        id: tag
        if: startsWith(github.ref_name, 'v')
        run: |
          tag=$(echo "${{github.ref_name}}" | cut -c2-)
          podman tag localhost/gotchet:latest $DOCKER_REPO:latest-${{ matrix.arch }}
          podman tag localhost/gotchet:latest $DOCKER_REPO:${tag}-${{ matrix.arch }}
          echo "tag=${tag}" >> $GITHUB_OUTPUT
      - name: Log into Docker Hub
        if: startsWith(github.ref_name, 'v')
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      - name: Push to Docker Hub
        if: startsWith(github.ref_name, 'v')
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c
        with:
          tags: ${{ env.DOCKER_REPO }}:latest-${{ matrix.arch }} ${{ env.DOCKER_REPO }}:${{ steps.tag.outputs.tag }}-${{ matrix.arch }}

  manifest:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref_name, 'v')
    steps:
      - name: Determine version tag
        id: tag
        run: |
          tag=$(echo "${{github.ref_name}}" | cut -c2-)
          echo "tag=${tag}" >> $GITHUB_OUTPUT
      - name: Log into Docker Hub
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      - name: Create and push manifest for latest
        run: |
          podman manifest create $DOCKER_REPO:latest \
            $DOCKER_REPO:latest-amd64 \
            $DOCKER_REPO:latest-arm64
          podman manifest push $DOCKER_REPO:latest docker://$DOCKER_REPO:latest
      - name: Create and push manifest for version tag
        run: |
          tag=${{ steps.tag.outputs.tag }}
          podman manifest create $DOCKER_REPO:${tag} \
            $DOCKER_REPO:${tag}-amd64 \
            $DOCKER_REPO:${tag}-arm64
          podman manifest push $DOCKER_REPO:${tag} docker://$DOCKER_REPO:${tag}
